<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <a href="index.html" class="navbar-brand">Todo</a>
    <ul class="navbar-links">
      <li><a href="index.html">Todos</a></li>
      <li><a href="add.html">Add</a></li>
      <li><a href="profile.html">Profile</a></li>
    </ul>
  </nav>

  <main class="container">
    <div class="profile-header">
      <div class="profile-avatar">J</div>
      <div class="profile-name">John Doe</div>
      <div class="profile-email">john@example.com</div>
      
      <div class="profile-stats">
        <div class="stat">
          <div class="stat-value">12</div>
          <div class="stat-label">Total</div>
        </div>
        <div class="stat">
          <div class="stat-value">8</div>
          <div class="stat-label">Done</div>
        </div>
        <div class="stat">
          <div class="stat-value">4</div>
          <div class="stat-label">Pending</div>
        </div>
      </div>
    </div>
    
    <div class="profile-actions">
      <a href="#" class="btn btn-secondary">Edit Profile</a>
      <a href="login.html" class="btn btn-secondary">Logout</a>
    </div>
  </main>
</body>
</html>
